openai_api_key: ''
model: gpt-5.4
category_id: mlb_game_winner
category_ids:
  mlb: mlb_game_winner
  f1: f1_race_winner
subcategory: MLB
top_n_per_team: 3
templates_directory: templates
templates_enabled:
  entertainment_placeholder: false
  markets_placeholder: false
  mlb_game_winner: true
  mlb_home_run: false
  mlb_rbi: false
  mlb_steal_base: false
  mlb_total_runs_over_8_5: false
  mlb_win_margin_2: false
  news_placeholder: false
  sample_csv_event_yesno: true
  sample_csv_event_mc: true
  sample_csv_entity_hr: true
  f1_race_winner_head_to_head: true
  f1_race_winner_flag: true
  f1_race_winner_yes_no: true
  f1_race_finish_ahead_yes_no: true
date_filter:
  start: '2026-01-01'
  end: '2026-12-31'
date_rules:
  default:
    start_offset_hours: -24
    expiration_offset_hours: 0
    resolution_offset_hours: 4
  mlb:
    start_offset_hours: -24
    expiration_offset_hours: 0
    resolution_offset_hours: 4
  f1:
    start_offset_hours: -24
    expiration_offset_hours: 0
    resolution_offset_hours: 4
batch_size: 100
max_generated_questions: 1774
model_pricing:
  gpt-4o:
    input: 2.5
    output: 10.0
  gpt-4o-mini:
    input: 0.15
    output: 0.6
  gpt-5.4:
    input: 2.5
    output: 10.0
inputs:
  directory: inputs
  category_key: mlb
  files:
    mlb:
      event_source: schedule.xlsx
      metric_source: stats.xlsx
    F1:
      schedule: f1_schedule.xlsx
  file_roles:
    F1:
      schedule: event_source
  packages:
    f1:
      race_session_values:
        - Race
      placeholder_home_team: Driver_A
      placeholder_away_team: Driver_B
parsing:
  persist_profiles: true
  auto_detect_headers: true
  min_confidence: 0.5
